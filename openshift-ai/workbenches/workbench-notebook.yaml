apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: my-workbench
  namespace: fine-tuning
  labels:
    opendatahub.io/dashboard: "true"
    opendatahub.io/odh-managed: "true"
  annotations:
    notebooks.opendatahub.io/inject-oauth: "true"
    opendatahub.io/image-display-name: Jupyter | PyTorch | CUDA | Python 3.12
    notebooks.opendatahub.io/oauth-logout-url: "https://rhods-dashboard-redhat-ods-applications.apps.tiago-cluster.sandbox5539.opentlc.com/projects/fine-tuning?notebookLogout=my-workbench"
    opendatahub.io/accelerator-name: migrated-gpu
    opendatahub.io/hardware-profile: nvidia-l4-profile
    openshift.io/description: PyTorch CUDA workbench with GPU and MinIO connection
    openshift.io/display-name: My Workbench
    notebooks.opendatahub.io/last-image-selection: "pytorch:3.4"
    notebooks.opendatahub.io/last-size-selection: Medium
    opendatahub.io/username: aiadmin
spec:
  template:
    spec:
      affinity: {}
      tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Exists
      containers:
        - name: my-workbench
          image: "image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/pytorch:3.4"
          imagePullPolicy: Always
          workingDir: /opt/app-root/src
          env:
            - name: NOTEBOOK_ARGS
              value: |-
                --ServerApp.port=8888
                --ServerApp.token=''
                --ServerApp.password=''
                --ServerApp.base_url=/notebook/fine-tuning/my-workbench
                --ServerApp.quit_button=False
                --ServerApp.tornado_settings={"user":"aiadmin","hub_host":"https://rhods-dashboard-redhat-ods-applications.apps.tiago-cluster.sandbox5539.opentlc.com","hub_prefix":"/projects/fine-tuning"}
            - name: JUPYTER_IMAGE
              value: "image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/pytorch:3.4"
            - name: PIP_CERT
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: REQUESTS_CA_BUNDLE
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: SSL_CERT_FILE
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: PIPELINES_SSL_SA_CERTS
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: GIT_SSL_CAINFO
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: LD_LIBRARY_PATH
              value: /usr/lib64
          envFrom:
            - secretRef:
                name: minio-s3-connection
          ports:
            - containerPort: 8888
              name: notebook-port
              protocol: TCP
          resources: {}
          readinessProbe:
            httpGet:
              path: /notebook/fine-tuning/my-workbench/api
              port: notebook-port
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 1
          livenessProbe:
            httpGet:
              path: /notebook/fine-tuning/my-workbench/api
              port: notebook-port
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 1
          volumeMounts:
            - name: fine-tuning
              mountPath: /opt/app-root/src/
            - name: shm
              mountPath: /dev/shm
            - name: trusted-ca
              mountPath: /etc/pki/tls/custom-certs/ca-bundle.crt
              subPath: ca-bundle.crt
              readOnly: true
            - name: runtime-images
              mountPath: /opt/app-root/pipeline-runtimes/
      enableServiceLinks: false
      serviceAccountName: my-workbench
      volumes:
        - name: fine-tuning
          persistentVolumeClaim:
            claimName: fine-tuning
        - name: shm
          emptyDir:
            medium: Memory
        - name: trusted-ca
          configMap:
            name: workbench-trusted-ca-bundle
            items:
              - key: ca-bundle.crt
                path: ca-bundle.crt
            optional: true
        - name: runtime-images
          configMap:
            name: pipeline-runtime-images
            optional: true
