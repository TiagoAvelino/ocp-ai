apiVersion: v1
kind: Secret
metadata:
  name: minio-s3-connection
  namespace: my-data-science-project
  annotations:
    openshift.io/description: "MinIO S3 connection for OpenShift AI"
    openshift.io/display-name: "MinIO S3"
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: YOUR_ACCESS_KEY
  AWS_SECRET_ACCESS_KEY: YOUR_SECRET_KEY
  AWS_DEFAULT_REGION: us-east-1
  AWS_S3_ENDPOINT: http://minio-api.minio.svc.cluster.local:9000
  AWS_S3_BUCKET: my-ml-bucket
