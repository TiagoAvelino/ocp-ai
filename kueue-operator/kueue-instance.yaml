apiVersion: kueue.openshift.io/v1
kind: Kueue
metadata:
  name: cluster
  namespace: openshift-kueue-operator
  labels:
    app.kubernetes.io/name: kueue-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  managementState: Managed
  config:
    integrations:
      frameworks:
        - BatchJob
        - MPIJob
        - RayJob
        - RayCluster
        - JobSet
        - Pod
        - PaddleJob
        - PyTorchJob
        - TFJob
        - XGBoostJob
        - Deployment
        - AppWrapper
    preemption:
      preemptionPolicy: Classical
