apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ocp-mcp
  namespace: agent-demo
subjects:
  - kind: ServiceAccount
    name: ocp-mcp
    namespace: agent-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
