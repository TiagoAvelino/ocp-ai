kind: ClusterRoleBinding
metadata:
  name: cluster-admin-ocp-mcp-agent-demo
subjects:
  - kind: ServiceAccount
    name: ocp-mcp
    namespace: agent-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
