---
- name: Deploy GPU stack and OpenShift AI on OpenShift
  hosts: localhost
  connection: local
  gather_facts: false

  pre_tasks:
    - name: Display deployment plan
      ansible.builtin.debug:
        msg:
          - "=== OpenShift AI Full Stack Deployment ==="
          - "Step 0: Create OpenShift Cluster (AWS)"
          - "Step 1: User Setup (HTPasswd, cluster-admin, RHOAI admin)"
          - "Step 2: Node Feature Discovery (NFD) Operator"
          - "Step 3: NVIDIA GPU Operator"
          - "Step 4: cert-manager Operator"
          - "Step 5: Kueue Operator"
          - "Step 6: Red Hat OpenShift Serverless Operator"
          - "Step 7: Red Hat OpenShift Service Mesh 3.x Operator"
          - "Step 8: MinIO Object Storage"
          - "Step 9: Red Hat OpenShift AI (with llamastackoperator Managed)"
          - "Step 10: NVIDIA L4 Hardware Profile"
          - "Step 11: Workbench Setup"

  roles:
    - role: openshift_cluster_installation
      tags: [cluster, installation]

    - role: prerequisites
      tags: [prerequisites]

    - role: user_setup
      tags: [users, auth]

    - role: nfd_operator
      tags: [nfd, operators]

    - role: nvidia_gpu_operator
      tags: [nvidia, operators]

    - role: cert_manager
      tags: [cert-manager, operators]

    - role: kueue_operator
      tags: [kueue, operators]

    - role: serverless_operator
      tags: [serverless, operators, kserve-deps]

    - role: servicemesh3_operator
      tags: [servicemesh3, operators, kserve-deps, genai-deps]

    - role: minio
      tags: [minio, storage]

    - role: openshift_ai
      tags: [rhoai, operators]

    - role: hardware_profile
      tags: [hardware-profile, rhoai]

    - role: workbench
      tags: [workbench, project]

  post_tasks:
    - name: Deployment complete
      ansible.builtin.debug:
        msg:
          - "=== Installation Complete ==="
          - "Next steps:"
          - "  1. Label GPU nodes:  oc label node <node> nvidia.com/gpu.present=true"
          - "  2. Verify GPU nodes: oc get nodes -l nvidia.com/gpu.present=true"
          - "  3. Verify ClusterPolicy: oc get clusterpolicy gpu-cluster-policy"
          - "  4. Verify NFD: oc get nodefeaturediscovery -n {{ nfd_namespace }}"
          - "  5. Enable OpenShift AI components by setting managementState to Managed"
          - "  6. Access the OpenShift AI dashboard"
