kueue_subscription_name: kueue-operator
kueue_package_manifest: kueue-operator
kueue_catalog_source: redhat-operators

# Service Mesh Operator (KServe dependency)
servicemesh_namespace: openshift-operators
servicemesh_subscription_name: servicemeshoperator
servicemesh_package_manifest: servicemeshoperator
servicemesh_catalog_source: redhat-operators

# Serverless Operator (KServe dependency)
